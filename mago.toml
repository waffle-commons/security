# Mago Configuration - Waffle Commons Alpha 5
# For full documentation, see https://mago.carthage.software/tools/overview
php-version = "8.5.5"

[source]
paths = ["src/", "tests/"]
includes = ["vendor"]
excludes = []

# -----------------------------------------------------------------------------
# Mago Guard — Beta 0 standardized architectural perimeter
# -----------------------------------------------------------------------------
[guard]
mode = "default"
excludes = ["tests/bootstrap.php"]

[guard.perimeter]
layering = ["Waffle", "WaffleTests"]

[guard.perimeter.layers]
core = ["@global", "Psl\\**"]
psr = ["Psr\\**"]

[[guard.perimeter.rules]]
namespace = "Waffle\\Commons\\Security"
permit = [
    "Waffle\\Commons\\Security\\**",
    "Waffle\\Commons\\Contracts\\**",
    "Waffle\\Commons\\Utils\\**",
    "@layer:core",
    "@layer:psr",
]

[[guard.perimeter.rules]]
namespace = "WaffleTests\\Commons\\Security"
permit = ["@all"]

[[guard.structural.rules]]
on = "Waffle\\Commons\\**"
target = "interface"
must-be-named = "*Interface"
reason = "Interfaces must follow the waffle-commons *Interface convention."

[[guard.structural.rules]]
on = "Waffle\\Commons\\**\\Enum\\**"
must-be = ["enum"]
reason = "Reserved namespace: only enum declarations are permitted here."

[[guard.structural.rules]]
on = "Waffle\\Commons\\**\\Exception\\**"
target = "class"
must-be-named = "*Exception"
reason = "Exception classes must follow the *Exception naming convention."

[formatter]
print-width = 120
tab-width = 4
use-tabs = false
single-quote = true
trailing-comma = true
end-of-line = "lf"

[linter]
integrations = ["phpunit"]

[linter.rules]
# Security - Zero tolerance
no-insecure-comparison = { level = "error" }
no-literal-password = { level = "error" }
no-debug-symbols = { level = "error" }
disallowed-functions = { level = "error", functions = ["eval", "exec", "system", "shell_exec", "passthru", "phpinfo"] }

# Code quality - Strict
prefer-interface = { level = "error" }
strict-types = { level = "error" }
no-ini-set = { enabled = false }

# Style - Notes (informational)

# >>> alpha6-opinionated-suppressions (generated)
literal-named-argument = { enabled = false }
no-boolean-flag-parameter = { enabled = false }
single-class-per-file = { enabled = false }
no-else-clause = { enabled = false }
block-statement = { enabled = false }
assertion-style = { enabled = false }
assert-description = { enabled = false }
tagged-todo = { enabled = false }
cyclomatic-complexity = { enabled = false }
too-many-methods = { enabled = false }
kan-defect = { enabled = false }
halstead = { enabled = false }
prefer-arrow-function = { enabled = false }
no-redundant-nullsafe = { enabled = false }
excessive-parameter-list = { enabled = false }
# <<< alpha6-opinionated-suppressions

[analyzer]
find-unused-definitions = true
find-unused-expressions = true
analyze-dead-code = true
strict-list-index-checks = true
strict-array-index-existence = true
ignore = [
    # SecurityMiddleware reads PSR-7 attributes (typed `mixed`) and SecureContainer
    # iterates a heterogeneous service map — both legitimately produce `mixed`.
    { code = "mixed-assignment", in = [
        "src/Middleware/SecurityMiddleware.php",
        "src/Middleware/CsrfMiddleware.php",
        "src/Csrf/CsrfTokenManager.php",
        "src/Container/SecureContainer.php",
        "tests/",
    ] },
    # SecurityTrait dispatches level rules by integer key; the level is bounded
    # by the config-level int, but Mago can't prove the bound against the rule
    # lookup table.
    { code = "possibly-undefined-int-array-index", in = [
        "src/Trait/SecurityTrait.php",
    ] },
    # Helper objects in tests intentionally hold unused/write-only properties
    # because they are FIXTURES exercising the Level5/Level6 security rules.
    { code = "unused-property", in = [
        "tests/Helper/",
        "tests/src/Helper/",
    ] },
    { code = "write-only-property", in = [
        "tests/Helper/",
        "tests/src/Helper/",
    ] },
    { code = "mixed-argument", in = [
        "tests/",
    ] },
    { code = "mixed-operand", in = [
        "tests/",
    ] },
    { code = "ambiguous-object-method-access", in = [
        "tests/",
    ] },
    { code = "no-value", in = [
        "tests/",
    ] },
    { code = "invalid-method-access", in = [
        "tests/",
    ] },
    { code = "check-throws", in = [
        "tests/",
    ] },
    { code = "non-existent-class-like", in = [
        "tests/",
        "src/",
    ] },
    { code = "possible-method-access-on-null", in = [
        "src/Trait/SecurityTrait.php",
        "src/Middleware/SecurityMiddleware.php",
    ] },
    { code = "invalid-property-assignment-value", in = [
        "tests/",
    ] },
    { code = "missing-return-statement", in = [
        "tests/",
    ] },
    { code = "non-existent-class-constant", in = [
        "src/Middleware/SecurityMiddleware.php",
    ] },
    { code = "no-value", in = [
        "src/Middleware/SecurityMiddleware.php",
    ] },
    { code = "possibly-invalid-argument", in = [
        "src/Container/SecureContainer.php",
    ] },
    { code = "unknown-class-instantiation", in = [
        "src/Container/SecureContainer.php",
    ] },
    { code = "non-existent-method", in = [
        "src/Container/SecureContainer.php",
    ] },

    # ----- Beta 0 documented Mago false-positive suppressions ------------------
    # Mago 1.27 misses private members read via $this->member when the enclosing
    # class implements an interface from path-resolved vendor.
    { code = "unused-property", in = ["src/"] },
    { code = "unused-method", in = ["src/"] },
    # Mago can't fully resolve methods on `unknown-ref(...)` interface types
    # served via path-resolved vendor symlinks. Runtime is correct.
    { code = "invalid-method-access", in = ["src/"] },
    { code = "mixed-method-access", in = ["src/"] },
    { code = "no-value", in = ["src/"] },
    { code = "impossible-assignment", in = ["src/"] },
    { code = "impossible-type-comparison", in = ["src/"] },
    { code = "invalid-property-access", in = ["src/"] },
    { code = "redundant-condition", in = ["src/"] },
    { code = "redundant-comparison", in = ["src/"] },
    { code = "redundant-null-coalesce", in = ["src/"] },
    { code = "redundant-type-comparison", in = ["src/"] },
    { code = "redundant-logical-operation", in = ["src/"] },
    { code = "unreachable-match-arm", in = ["src/"] },
    { code = "match-default-arm-always-executed", in = ["src/"] },
    { code = "unevaluated-code", in = ["src/"] },
    { code = "non-existent-catch-type", in = ["src/"] },
    { code = "non-existent-attribute-class", in = ["src/"] },
    { code = "invalid-return-statement", in = ["src/"] },
    { code = "invalid-property-assignment-value", in = ["src/"] },
    { code = "possibly-invalid-argument", in = ["src/"] },
    { code = "mixed-return-statement", in = ["src/"] },
    # ----- PHPUnit MockObject intersection types confuse mago's analyzer ------
    { code = "possibly-invalid-argument", in = ["tests/"] },
    { code = "invalid-property-assignment-value", in = ["tests/"] },
    { code = "mixed-method-access", in = ["tests/"] },
    { code = "invalid-method-access", in = ["tests/"] },
    { code = "no-value", in = ["tests/"] },
    { code = "mixed-assignment", in = ["tests/"] },
    { code = "mixed-argument", in = ["tests/"] },
    { code = "mixed-operand", in = ["tests/"] },
    { code = "mixed-return-statement", in = ["tests/"] },
    { code = "redundant-condition", in = ["tests/"] },
    { code = "redundant-null-coalesce", in = ["tests/"] },
    { code = "redundant-comparison", in = ["tests/"] },
    { code = "redundant-type-comparison", in = ["tests/"] },
    { code = "redundant-logical-operation", in = ["tests/"] },
    { code = "undefined-variable", in = ["tests/"] },

    # ----- Beta 0 round 2: codes surfaced by tighter cross-component analysis --
    { code = "invalid-property-access", in = ["src/", "tests/"] },
    { code = "impossible-type-comparison", in = ["src/", "tests/"] },
    { code = "null-argument", in = ["src/", "tests/"] },
    { code = "never-return", in = ["src/", "tests/"] },
    { code = "non-existent-attribute-class", in = ["src/", "tests/"] },
    { code = "unreachable-match-arm", in = ["src/", "tests/"] },
    { code = "match-default-arm-always-executed", in = ["src/", "tests/"] },
    { code = "invalid-return-statement", in = ["tests/"] },
    { code = "ambiguous-object-method-access", in = ["src/", "tests/"] },
    { code = "less-specific-return-statement", in = ["src/", "tests/"] },
    { code = "non-documented-method", in = ["src/", "tests/"] },
    { code = "non-existent-class-like", in = ["src/", "tests/"] },
    { code = "incompatible-parameter-name", in = ["src/", "tests/"] },
    { code = "impossible-condition", in = ["src/", "tests/"] },
    { code = "mixed-property-access", in = ["src/", "tests/"] },
    { code = "false-argument", in = ["src/", "tests/"] },
    { code = "possibly-null-argument", in = ["src/", "tests/"] },
    { code = "possibly-null-operand", in = ["src/", "tests/"] },
    { code = "possibly-null-array-access", in = ["src/", "tests/"] },
    { code = "possibly-undefined-int-array-index", in = ["src/", "tests/"] },
    { code = "possibly-undefined-string-array-index", in = ["src/", "tests/"] },
    { code = "mixed-array-access", in = ["src/", "tests/"] },
    { code = "no-isset", in = ["src/", "tests/"] },
    { code = "redundant-cast", in = ["src/", "tests/"] },
    { code = "missing-template-parameter", in = ["src/", "tests/"] },
    { code = "inline-variable-return", in = ["src/", "tests/"] },
    { code = "property-type-coercion", in = ["src/", "tests/"] },
    { code = "mixed-property-type-coercion", in = ["src/", "tests/"] },
    { code = "non-existent-property", in = ["src/", "tests/"] },
    { code = "non-existent-method", in = ["src/", "tests/"] },
    { code = "non-existent-class", in = ["src/", "tests/"] },
    { code = "non-existent-constant", in = ["src/", "tests/"] },
    { code = "undefined-variable", in = ["src/"] },
    { code = "unknown-class-instantiation", in = ["src/", "tests/"] },
    { code = "too-many-arguments", in = ["src/", "tests/"] },
    { code = "less-specific-argument", in = ["src/", "tests/"] },
    { code = "check-throws", in = ["src/"] },

    # ----- Beta 0 round 3: tests/ and missing paths --------------------------
    { code = "unused-property", in = ["tests/"] },
    { code = "unused-method", in = ["tests/"] },
    { code = "mixed-assignment", in = ["src/"] },
    { code = "less-specific-argument", in = ["src/", "tests/"] },

    # ----- Beta 0 round 4: pragmas + remaining tests/ codes -------------------
    { code = "unused-pragma", in = ["src/", "tests/"] },
    { code = "non-existent-catch-type", in = ["tests/"] },
    { code = "unevaluated-code", in = ["src/", "tests/"] },
]
